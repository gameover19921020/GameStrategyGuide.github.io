<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>龙门攻略库 | Chinese Game Guides</title>
    <meta
      name="description"
      content="A multilingual guide hub for global players discovering Chinese games, builds, boss tactics, farming routes, and beginner guides."
    />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2064249109750409"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar" aria-label="Primary">
        <a class="brand" href="#" aria-label="Home">
          <span class="brand-mark" aria-hidden="true">门</span>
          <span>
            <strong data-i18n="brand">龙门攻略库</strong>
            <small data-i18n="brandSub">中国游戏全球攻略索引</small>
          </span>
        </a>

        <nav class="nav-links" aria-label="Sections">
          <a href="#guides" data-i18n="navGuides">攻略</a>
          <a href="#games" data-i18n="navGames">游戏</a>
          <a href="#submit" data-i18n="navSubmit">投稿</a>
        </nav>

        <div class="top-actions">
          <label class="language-control" for="languageSelect">
            <span data-i18n="language">语言</span>
            <select id="languageSelect" aria-label="Language"></select>
          </label>
        </div>
      </header>

      <main>
        <section class="command-deck" aria-labelledby="pageTitle">
          <canvas id="heroCanvas" aria-hidden="true"></canvas>
          <div class="deck-copy">
            <p class="eyebrow" data-i18n="eyebrow">多语言中国游戏攻略站</p>
            <h1 id="pageTitle" data-i18n="headline">让全球玩家读懂中国游戏</h1>
            <p class="lead" data-i18n="lead">
              按游戏专题组织入门、养成、战斗、资源、Boss 和版本攻略，让海外玩家能从一款游戏进入完整攻略系列。
            </p>
          </div>
          <div class="deck-metrics" aria-label="Site metrics">
            <article>
              <strong id="metricGuides">0</strong>
              <span data-i18n="metricGuides">攻略条目</span>
            </article>
            <article>
              <strong>8</strong>
              <span data-i18n="metricLangs">界面语言</span>
            </article>
            <article>
              <strong id="metricGames">0</strong>
              <span data-i18n="metricGames">中国游戏</span>
            </article>
          </div>
        </section>

        <section class="workspace" id="guides">
          <aside class="filter-rail" aria-label="Guide filters">
            <div class="rail-section">
              <label class="field-label" for="searchInput" data-i18n="searchLabel">搜索攻略</label>
              <div class="search-box">
                <span aria-hidden="true">⌕</span>
                <input id="searchInput" type="search" autocomplete="off" data-i18n-placeholder="searchPlaceholder" />
              </div>
            </div>

            <div class="rail-section">
              <p class="field-label" data-i18n="gameFilter">游戏</p>
              <div class="chip-grid" id="gameFilters"></div>
            </div>

            <div class="rail-section">
              <p class="field-label" data-i18n="typeFilter">攻略类型</p>
              <div class="chip-grid" id="typeFilters"></div>
            </div>

            <div class="rail-section submit-note" id="submit">
              <p data-i18n="submitTitle">缺少你的游戏？</p>
              <span data-i18n="submitText">提交游戏、攻略主题或资料来源，编辑审核后加入专题库。</span>
              <button class="text-action" type="button" id="submitButton" data-i18n="submitButton">提交攻略线索</button>
            </div>
          </aside>

          <section class="guide-board" aria-live="polite">
            <div class="board-head">
              <div>
                <p class="eyebrow" data-i18n="boardEyebrow">游戏目录</p>
                <h2 data-i18n="boardTitle">选择游戏进入专题攻略</h2>
              </div>
              <div class="sort-control">
                <label for="sortSelect" data-i18n="sortLabel">排序</label>
                <select id="sortSelect" aria-label="Sort guides">
                  <option value="updated" data-i18n="sortUpdated">最近更新</option>
                  <option value="difficulty" data-i18n="sortDifficulty">适合新手</option>
                  <option value="popular" data-i18n="sortPopular">热度最高</option>
                </select>
              </div>
            </div>

            <div class="game-catalog" id="gameCatalog"></div>
            <p class="empty-state" id="emptyState" hidden data-i18n="emptyState">没有找到匹配的攻略。</p>
          </section>
        </section>

        <section class="game-index" id="games" aria-labelledby="gamesTitle" hidden>
          <div id="gameDetail"></div>
        </section>
      </main>
    </div>

    <dialog class="guide-dialog" id="guideDialog">
      <button class="dialog-close" type="button" id="closeDialog" aria-label="Close">×</button>
      <div id="dialogContent"></div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
